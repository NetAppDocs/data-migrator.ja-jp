  title: NetApp Data Migrator のドキュメント
  summary: NetApp Data Migratorは、エンタープライズグレードのマルチクラウド対応データ移行ソフトウェア アプリケーションで、オンプレミスまたはサードパーティのストレージシステムからNetAppを基盤とするパブリッククラウドストレージサービスへの非構造化ファイルデータの移行を簡素化します。NetApp
    Data Migratorは、ユーザーが管理する仮想マシン上で動作する独立したアプリケーションであり、複雑なカスタムスクリプトやばらばらのツールを必要としません。
